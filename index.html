<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Product List | Homedecor</title>
    <style>
        /* RESET: remove all margins, paddings, borders that cause whitespace */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;            /* prevent body scroll, table will handle internal scroll */
            background: #eef2f7;
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        /* full-screen container: no padding, occupies entire viewport */
        .fullscreen-core {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            background: white;
            box-shadow: none;
            border-radius: 0;
            overflow: hidden;
        }

        /* compact header with minimal vertical space, no outer gaps */
        .core-header {
            padding: 12px 20px;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafd 100%);
            border-bottom: 1px solid #e2e9f2;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .title-section h1 {
            font-size: 1.35rem;
            font-weight: 700;
            background: linear-gradient(145deg, #1f4e6e, #0f2c40);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
            margin: 0;
            line-height: 1.2;
        }

        .title-section p {
            font-size: 11px;
            color: #4a627a;
            margin-top: 3px;
            margin-bottom: 0;
        }

        .info-panel {
            background: #eef2fc;
            padding: 5px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 12px;
            font-weight: 500;
        }

        .info-item {
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .info-label {
            color: #2c5a7a;
        }

        .info-value {
            color: #1f3b4c;
            font-weight: 700;
            background: white;
            padding: 2px 10px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 12px;
        }

        .last-updated-badge {
            background: #dff0e4;
            border-radius: 30px;
            padding: 3px 12px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .admin-note {
            background: #fef4e8;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 10px;
            color: #b45f06;
        }

        /* filter toolbar - compact, no outer margins */
        .filter-toolbar {
            padding: 10px 20px;
            background: #ffffff;
            border-bottom: 1px solid #e9edf2;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-shrink: 0;
        }

        .search-global {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 60px;
            padding: 4px 14px;
            gap: 8px;
            flex: 2;
            min-width: 240px;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
        }

        .search-global:focus-within {
            background: white;
            border-color: #2c6e9e;
            box-shadow: 0 0 0 2px rgba(44,110,158,0.2);
        }

        .search-global input {
            border: none;
            background: transparent;
            padding: 8px 0;
            font-size: 13px;
            width: 100%;
            outline: none;
        }

        .search-icon {
            font-size: 16px;
            color: #6c86a0;
        }

        .clear-search {
            background: none;
            border: none;
            color: #c7452c;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 30px;
        }

        .clear-search:hover {
            background: #ffe6e5;
        }

        .filter-stats-badge {
            background: #eef2fa;
            border-radius: 32px;
            padding: 4px 14px;
            font-size: 11px;
            font-weight: 500;
            white-space: nowrap;
        }

        /* status area - minimal top/bottom */
        #statusMessageArea {
            padding: 0 20px;
            margin: 6px 0 0 0;
            flex-shrink: 0;
        }

        .status-message {
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 12px;
            margin-bottom: 6px;
        }

        /* TABLE WRAPPER: takes all remaining vertical space, no padding, full scroll */
        .table-wrapper {
            flex: 1;
            overflow-x: auto;
            overflow-y: auto;
            width: 100%;
            background: white;
            scrollbar-width: thin;
            min-height: 0;   /* important for flex overflow */
        }

        /* full-width table, no margin, sticky header */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            font-family: 'Segoe UI', system-ui;
        }

        .data-table th {
            background: #1f3b4c;
            color: white;
            padding: 11px 12px;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }

        .data-table th:hover {
            background: #2c556e;
        }

        .th-sort {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .sort-arrow {
            font-size: 10px;
            opacity: 0.8;
        }

        .data-table td {
            border-bottom: 1px solid #e9edf2;
            padding: 10px 12px;
            white-space: nowrap;
        }

        .data-table tr:hover td {
            background-color: #f8fafd;
        }

        .highlight-match {
            background-color: #ffecb3;
            font-weight: 600;
            border-radius: 12px;
            padding: 0 3px;
            color: #b45f06;
            display: inline-block;
        }

        /* pagination compact, no extra margin */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 10px 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .pagination button {
            background-color: #2c6e9e;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 6px 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 12px;
        }

        .pagination button:disabled {
            background-color: #bdd4e8;
            cursor: not-allowed;
        }

        .page-info {
            font-weight: 600;
            background: #eef2fc;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 12px;
        }

        .empty-placeholder {
            text-align: center;
            padding: 50px 20px;
            color: #6c86a0;
            font-size: 14px;
        }

        .loading-spinner-local {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #e0e7ef;
            border-top: 2px solid #2c6e9e;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-left: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* responsive adjustments: keep full-screen behavior */
        @media (max-width: 700px) {
            .core-header {
                padding: 8px 12px;
            }
            .filter-toolbar {
                padding: 8px 12px;
            }
            .data-table th, .data-table td {
                padding: 7px 8px;
                font-size: 11px;
            }
            .info-panel {
                gap: 8px;
                padding: 4px 12px;
            }
        }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <!-- External Application Logic -->
    <script src="product-app.js" defer></script>
</head>
<body>

<div class="fullscreen-core">
    <div class="core-header">
        <div class="title-section">
            <h1>📦 Product Core View | Homedecor</h1>
            <p>1001 · 1002 · 1006 · 1007 · 1008 · 1010 · 1011 · UPC · ITEM DESCRIPTION · RETAIL PRICE · UNIT COST</p>
        </div>
        <div class="info-panel">
            <div class="info-item">
                <span class="info-label">📊 Total</span>
                <span class="info-value" id="totalRowsDisplay">—</span>
            </div>
            <div class="info-item">
                <span class="info-label">🔍 Filtered</span>
                <span class="info-value" id="filteredCountDisplay">—</span>
            </div>
            <div class="last-updated-badge" id="lastUpdatedBadge">
                🕒 sync: <span id="lastSyncTime">—</span>
            </div>
            <div class="admin-note">
                🔐 read-only • live
            </div>
        </div>
    </div>

    <div class="filter-toolbar">
        <div class="search-global">
            <span class="search-icon">🔍</span>
            <input type="text" id="globalSearchInput" placeholder="Search across all visible columns (UPC, description, price, unit cost...)" autocomplete="off">
            <button id="clearGlobalSearch" class="clear-search" style="background:transparent;">✖ Clear</button>
        </div>
        <div class="filter-stats-badge">
            ⚡ smart match: plurals & variations
        </div>
    </div>

    <div id="statusMessageArea"></div>

    <div class="table-wrapper" id="tableWrapper">
        <table class="data-table" id="coreDataTable">
            <thead id="tableHeader"></thead>
            <tbody id="tableBody">
                <tr><td colspan="11" class="empty-placeholder">🔄 Loading product data from cloud...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="pagination" id="paginationControls" style="display: none;">
        <button id="prevPageBtn">◀ Previous</button>
        <span class="page-info" id="pageInfoSpan">Page 1</span>
        <button id="nextPageBtn">Next ▶</button>
    </div>
</div>

</body>
</html>
