<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Homedecor Portal | Secure Access</title>
    <style>
        /* RESET & GLOBAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #eef2f7;
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        /* LOGIN OVERLAY (NO REGISTRATION) */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(25, 45, 60, 0.94);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.35s ease;
        }

        .auth-card {
            background: white;
            border-radius: 36px;
            width: 90%;
            max-width: 460px;
            padding: 32px 28px 38px;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeSlideUp 0.4s ease;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-icon {
            font-size: 56px;
            margin-bottom: 10px;
        }

        .auth-card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1f4e6e, #0f2c40);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 6px;
        }

        .auth-sub {
            color: #4a627a;
            font-size: 12px;
            margin-bottom: 28px;
            border-bottom: 1px solid #e9edf2;
            display: inline-block;
            padding-bottom: 6px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            font-size: 12px;
            font-weight: 600;
            color: #1f3b4c;
            display: block;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 60px;
            background: #fefefe;
            transition: all 0.2s;
            outline: none;
            font-family: inherit;
        }

        .input-group input:focus {
            border-color: #2c6e9e;
            box-shadow: 0 0 0 3px rgba(44,110,158,0.2);
            background: white;
        }

        .auth-btn {
            width: 100%;
            background: linear-gradient(105deg, #1f5e7e, #0f3b52);
            border: none;
            border-radius: 60px;
            padding: 12px 18px;
            font-size: 15px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.1);
        }

        .auth-btn:hover {
            background: linear-gradient(105deg, #0f4a64, #0a2e40);
            transform: scale(0.98);
        }

        .error-msg {
            background: #ffe9e8;
            color: #c23d2e;
            padding: 10px 14px;
            border-radius: 60px;
            font-size: 12px;
            margin-top: 16px;
            font-weight: 500;
        }

        .admin-badge {
            background: #fef4e8;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 11px;
            color: #b45f06;
            margin-top: 12px;
        }

        /* Main app container */
        .main-app-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.25s ease;
        }

        .main-app-container.visible {
            visibility: visible;
            opacity: 1;
        }

        .fullscreen-core {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            background: white;
            overflow: hidden;
        }

        .core-header {
            padding: 12px 20px;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafd 100%);
            border-bottom: 1px solid #e2e9f2;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .title-section h1 {
            font-size: 1.35rem;
            font-weight: 700;
            background: linear-gradient(145deg, #1f4e6e, #0f2c40);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .title-section p {
            font-size: 11px;
            color: #4a627a;
        }

        .info-panel {
            background: #eef2fc;
            padding: 5px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 12px;
        }

        .info-item {
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .info-value {
            color: #1f3b4c;
            font-weight: 700;
            background: white;
            padding: 2px 10px;
            border-radius: 30px;
            font-family: monospace;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 6px 18px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .logout-btn:hover {
            background: #c0392b;
            transform: scale(0.97);
        }

        .filter-toolbar {
            padding: 10px 20px;
            background: #ffffff;
            border-bottom: 1px solid #e9edf2;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .search-global {
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 60px;
            padding: 4px 14px;
            gap: 8px;
            flex: 2;
            min-width: 240px;
            border: 1px solid #e2e8f0;
        }

        .search-global input {
            border: none;
            background: transparent;
            padding: 8px 0;
            font-size: 13px;
            width: 100%;
            outline: none;
        }

        .clear-search {
            background: none;
            border: none;
            color: #c7452c;
            cursor: pointer;
            font-weight: 600;
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 30px;
        }

        .table-wrapper {
            flex: 1;
            overflow-x: auto;
            overflow-y: auto;
            width: 100%;
            scrollbar-width: thin;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-table th {
            background: #1f3b4c;
            color: white;
            padding: 11px 12px;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
        }

        .data-table td {
            border-bottom: 1px solid #e9edf2;
            padding: 10px 12px;
            white-space: nowrap;
        }

        .data-table tr:hover td {
            background-color: #f8fafd;
        }

        .highlight-match {
            background-color: #ffecb3;
            font-weight: 600;
            border-radius: 12px;
            padding: 0 3px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 10px 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            flex-shrink: 0;
        }

        .pagination button {
            background-color: #2c6e9e;
            color: white;
            border: none;
            border-radius: 40px;
            padding: 6px 20px;
            font-weight: 600;
            cursor: pointer;
        }

        .pagination button:disabled {
            background-color: #bdd4e8;
            cursor: not-allowed;
        }

        .page-info {
            background: #eef2fc;
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 12px;
        }

        .empty-placeholder {
            text-align: center;
            padding: 50px;
            color: #6c86a0;
        }

        .loading-spinner-local {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #e0e7ef;
            border-top: 2px solid #2c6e9e;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 700px) {
            .core-header, .filter-toolbar { padding: 8px 12px; }
            .data-table th, .data-table td { padding: 7px 8px; font-size: 11px; }
        }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <!-- External Application Logic -->
    <script src="script.js" defer></script>
</head>
<body>

<!-- AUTHENTICATION OVERLAY (ONLY LOGIN - NO REGISTRATION) -->
<div id="authOverlay" class="auth-overlay">
    <div class="auth-card" id="authCard">
        <div id="loginFormContainer">
            <div class="auth-icon">🔐</div>
            <h2>Homedecor Portal</h2>
            <div class="auth-sub">secure access · product core</div>
            <form id="loginForm" action="javascript:void(0);">
                <div class="input-group">
                    <label>👤 Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="off">
                </div>
                <div class="input-group">
                    <label>🔒 Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••">
                </div>
                <button type="submit" class="auth-btn">➤ Access Dashboard</button>
                <div id="loginErrorMsg" style="min-height: 48px;"></div>
                <div class="admin-badge">🔒 Authorized personnel only</div>
            </form>
        </div>
    </div>
</div>

<!-- MAIN APPLICATION (product core with logout) -->
<div id="mainAppContainer" class="main-app-container">
    <div class="fullscreen-core">
        <div class="core-header">
            <div class="title-section">
                <h1>📦 Product Core | Homedecor</h1>
                <p>UPC · ITEM DESCRIPTION · RETAIL PRICE · UNIT COST</p>
            </div>
            <div class="info-panel">
                <div class="info-item"><span>📊 Total</span><span class="info-value" id="totalRowsDisplay">—</span></div>
                <div class="info-item"><span>🔍 Filtered</span><span class="info-value" id="filteredCountDisplay">—</span></div>
                <div class="last-updated-badge" style="background:#dff0e4; border-radius:30px; padding:3px 12px; font-size:11px;">🕒 sync: <span id="lastSyncTime">—</span></div>
                <button id="logoutButton" class="logout-btn">🚪 Logout</button>
            </div>
        </div>
        <div class="filter-toolbar">
            <div class="search-global">
                <span>🔍</span>
                <input type="text" id="globalSearchInput" placeholder="Search across products (UPC, description, price...)" autocomplete="off">
                <button id="clearGlobalSearch" class="clear-search">✖ Clear</button>
            </div>
            <div class="filter-stats-badge" style="background:#eef2fa; border-radius:32px; padding:4px 14px; font-size:11px;">⚡ smart match</div>
        </div>
        <div class="table-wrapper" id="tableWrapper">
            <table class="data-table" id="coreDataTable">
                <thead id="tableHeader"></thead>
                <tbody id="tableBody"><tr><td colspan="11" class="empty-placeholder">🔐 Please authenticate to load data...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" id="paginationControls" style="display: none;">
            <button id="prevPageBtn">◀ Previous</button>
            <span class="page-info" id="pageInfoSpan">Page 1</span>
            <button id="nextPageBtn">Next ▶</button>
        </div>
    </div>
</div>
</body>
</html>
